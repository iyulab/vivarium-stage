name: publish

# 0.X release train: pushing a version tag (v0.0.1, v0.0.2, ...) publishes
# Vivarium.Stage to NuGet, then verifies it from the registry as a fresh
# consumer.
#
# Plain `v*` because this repo ships exactly one artifact — the tag has nothing
# to disambiguate. Repos that ship several (vivarium-changeset: npm + NuGet)
# prefix the tag with the artifact instead (`ts-v*` / `dotnet-v*`).
#
# NUGET_API_KEY is a nuget.org key scoped to the Vivarium.* prefix.
on:
  push:
    tags: ["v*"]

jobs:
  nuget:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Tag matches the project version
        id: meta
        run: |
          v=$(sed -n 's:.*<Version>\(.*\)</Version>.*:\1:p' src/Vivarium.Stage/Vivarium.Stage.csproj)
          if [ "v$v" != "$GITHUB_REF_NAME" ]; then
            echo "tag $GITHUB_REF_NAME does not match project version $v" >&2
            exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
      - name: Unit + fault-injection tests
        run: dotnet test -c Release
      - name: Pack
        run: dotnet pack src/Vivarium.Stage/Vivarium.Stage.csproj -c Release -o "$RUNNER_TEMP/nupkg"
        env:
          ContinuousIntegrationBuild: "true"
      - name: Push to nuget.org
        run: |
          dotnet nuget push "$RUNNER_TEMP/nupkg/*.nupkg" \
            --source https://api.nuget.org/v3/index.json \
            --api-key "${{ secrets.NUGET_API_KEY }}"
      # Prove the published artifact is consumable from the registry, not just
      # that the push returned 200. The index takes a few minutes to serve a new
      # version, hence the retry.
      - name: Verify the published package from the registry
        working-directory: ${{ runner.temp }}
        run: |
          mkdir consumer && cd consumer
          cat > consumer.csproj <<EOF
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <OutputType>Exe</OutputType>
              <TargetFramework>net10.0</TargetFramework>
              <Nullable>enable</Nullable>
              <ImplicitUsings>enable</ImplicitUsings>
            </PropertyGroup>
            <ItemGroup>
              <PackageReference Include="Vivarium.Stage" Version="${{ steps.meta.outputs.version }}" />
            </ItemGroup>
          </Project>
          EOF
          cat > Program.cs <<'EOF'
          using Vivarium.Stage;
          Console.WriteLine("registry ok: " + typeof(ChangeSession).FullName);
          EOF
          # --packages isolates the global-packages folder so a cached copy can
          # never stand in for the registry artifact this step exists to check.
          for i in $(seq 1 30); do
            dotnet restore --no-cache --packages "$RUNNER_TEMP/consumer-pkgs" && break
            sleep 20
          done
          dotnet run --project . --no-restore
